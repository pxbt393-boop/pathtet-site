  <!-- ============ Main illustration: Table with pâté, baguette, cranberry jam ============ -->

  <!-- Table surface -->
  <ellipse cx="800" cy="680" rx="600" ry="120" fill="#14224a" opacity="0.06"/>
  <ellipse cx="800" cy="680" rx="580" ry="110" fill="#14224a" opacity="0.04"/>

  <!-- Table edge lines -->
  <path d="M250,650 Q800,710 1350,650" fill="none" stroke="#d4e0f0" stroke-width="1.5" opacity="0.6"/>

  <!-- Gzhel napkin -->
  <path d="M520,580 L700,540 L1080,560 L900,600 Z" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.5" opacity="0.85"/>
  <path d="M540,585 L700,550 L1060,565 L900,595 Z" fill="none" stroke="#d4e0f0" stroke-width="0.8" opacity="0.5"/>
  <!-- Napkin Gzhel pattern -->
  <g opacity="0.4">
    <circle cx="620" cy="570" r="12" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="620" cy="570" r="6" fill="#d4e0f0"/>
    <circle cx="760" cy="560" r="10" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="760" cy="560" r="5" fill="#d4e0f0"/>
    <circle cx="900" cy="565" r="12" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="900" cy="565" r="6" fill="#d4e0f0"/>
    <circle cx="1010" cy="570" r="8" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="1010" cy="570" r="4" fill="#d4e0f0"/>
  </g>

  <!-- Baguette -->
  <g transform="translate(750,480) rotate(-12)">
    <ellipse cx="0" cy="0" rx="160" ry="35" fill="#d4e0f0" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="158" ry="33" fill="#fafbfe" opacity="0.8"/>
    <!-- Baguette scoring marks -->
    <path d="M-120,-8 Q-100,-25 -80,-8" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M-70,-8 Q-50,-25 -30,-8" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M-20,-8 Q0,-25 20,-8" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M30,-8 Q50,-25 70,-8" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.5"/>
    <path d="M80,-8 Q100,-25 120,-8" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.5"/>
    <!-- Crust highlights -->
    <path d="M-130,-2 Q-60,-18 130,-2" fill="none" stroke="#14224a" stroke-width="0.8" opacity="0.15"/>
  </g>

  <!-- Sliced baguette pieces -->
  <g transform="translate(580,490) rotate(-5)">
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="20" ry="24" fill="#e8eef7"/>
    <circle cx="0" cy="0" r="2" fill="#7fa7d4" opacity="0.3"/>
  </g>
  <g transform="translate(540,495) rotate(-8)">
    <ellipse cx="0" cy="0" rx="25" ry="30" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="20" ry="24" fill="#e8eef7"/>
    <circle cx="0" cy="0" r="2" fill="#7fa7d4" opacity="0.3"/>
  </g>

  <!-- Pâté terrine / jar -->
  <g transform="translate(800,560)">
    <!-- Jar body -->
    <rect x="-70" y="-80" width="140" height="120" rx="12" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.5" opacity="0.9"/>
    <!-- Pâté inside (visible through glass) -->
    <rect x="-60" y="-70" width="120" height="95" rx="8" fill="#e8eef7" opacity="0.5"/>
    <rect x="-58" y="-68" width="116" height="40" rx="6" fill="#d4e0f0" opacity="0.3"/>
    <!-- Jar neck -->
    <rect x="-45" y="-100" width="90" height="25" rx="4" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2"/>
    <!-- Lid -->
    <rect x="-50" y="-108" width="100" height="14" rx="4" fill="#14224a" opacity="0.15"/>
    <!-- Decorative label on jar -->
    <rect x="-45" y="-55" width="90" height="50" rx="4" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
    <g opacity="0.3">
      <path d="M-5,-45 Q5,-55 15,-45 Q5,-35 -5,-45Z" fill="#7fa7d4"/>
      <path d="M-5,-25 Q5,-35 15,-25 Q5,-15 -5,-25Z" fill="#7fa7d4"/>
    </g>
  </g>

  <!-- Second jar (smaller, behind) -->
  <g transform="translate(940,540) scale(0.7)">
    <rect x="-60" y="-70" width="120" height="100" rx="10" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1.2" opacity="0.7"/>
    <rect x="-50" y="-60" width="100" height="75" rx="6" fill="#e8eef7" opacity="0.4"/>
    <rect x="-40" y="-88" width="80" height="22" rx="4" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1"/>
  </g>

  <!-- Cranberry jam bowl -->
  <g transform="translate(1020,580)">
    <ellipse cx="0" cy="0" rx="55" ry="18" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2"/>
    <path d="M-55,0 Q-55,-40 0,-50 Q55,-40 55,0" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2"/>
    <!-- Jam inside -->
    <ellipse cx="0" cy="-15" rx="45" ry="28" fill="#d4e0f0" opacity="0.4"/>
    <!-- Berries -->
    <circle cx="-15" cy="-20" r="5" fill="#14224a" opacity="0.15"/>
    <circle cx="10" cy="-25" r="4" fill="#14224a" opacity="0.12"/>
    <circle cx="5" cy="-12" r="5" fill="#14224a" opacity="0.15"/>
    <circle cx="-5" cy="-28" r="4" fill="#14224a" opacity="0.1"/>
  </g>

  <!-- Small Gzhel floral decoration on table -->
  <g transform="translate(480,610)" opacity="0.35">
    <path d="M0,-20 C5,-15 8,-5 6,0 C8,5 5,15 0,20" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
    <path d="M0,-12 C4,-8 5,-2 4,0" fill="none" stroke="#d4e0f0" stroke-width="1"/>
    <circle cx="6" cy="-4" r="3" fill="#7fa7d4"/>
    <circle cx="6" cy="4" r="3" fill="#7fa7d4"/>
  </g>

  <!-- ============ Title text ============ -->
  <text x="800" y="160" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" fill="#14224a" letter-spacing="4" opacity="0.9">НЕГЛИЖЕ</text>
  <text x="800" y="200" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#7fa7d4" letter-spacing="6" opacity="0.7">ДОМАШНИЙ ПАШТЕТ</text>

  <!-- Decorative line under title -->
  <g opacity="0.4">
    <path d="M350,220 Q500,230 650,220" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <path d="M950,220 Q1100,230 1250,220" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="800" cy="223" r="4" fill="#7fa7d4"/>
  </g>

  <!-- Label overlay -->
  <rect x="650" y="760" width="300" height="40" rx="20" fill="#14224a" opacity="0.08"/>
  <text x="800" y="786" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#14224a" letter-spacing="3" opacity="0.6">ФОТО ПРЕДПРОСМОТР</text>

  <!-- Gzhel floral spray in the center-right area -->
  <g transform="translate(1250,300)" opacity="0.3">
    <path d="M0,80 Q-20,40 -10,0 Q0,-20 10,-40" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M0,80 Q20,50 15,10 Q10,-10 5,-30" fill="none" stroke="#d4e0f0" stroke-width="1"/>
    <path d="M-10,0 C-20,-10 -15,-25 -5,-20 C-10,-30 -5,-45 5,-35" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="-5" cy="-20" r="8" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="-5" cy="-20" r="4" fill="#d4e0f0" opacity="0.6"/>
  </g>

  <!-- Left side floral decoration -->
  <g transform="translate(300,350)" opacity="0.25">
    <path d="M0,100 Q30,60 20,0 Q10,-30 0,-60" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M20,0 C35,-15 30,-40 15,-30 C25,-50 10,-70 -5,-50" fill="none" stroke="#d4e0f0" stroke-width="1"/>
    <path d="M0,-60 C-10,-80 -5,-100 5,-90" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="15" cy="-30" r="10" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
    <circle cx="15" cy="-30" r="5" fill="#d4e0f0" opacity="0.5"/>
  </g>
</svg>
