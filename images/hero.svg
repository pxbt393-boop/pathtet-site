<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbfe"/>
      <stop offset="100%" stop-color="#e8eef7"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14224a"/>
      <stop offset="100%" stop-color="#7fa7d4"/>
    </linearGradient>
    <pattern id="dot" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#d4e0f0" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#dot)"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="1576" height="876" fill="none" stroke="#14224a" stroke-width="3" rx="8"/>
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#7fa7d4" stroke-width="1" rx="6"/>
  <rect x="28" y="28" width="1544" height="844" fill="none" stroke="#d4e0f0" stroke-width="1" rx="4"/>

  <!-- Corner Gzhel rosettes -->
  <!-- Top-left corner rose -->
  <g transform="translate(80,80) scale(1.1)" opacity="0.7">
    <path d="M0,-40 C15,-35 25,-15 20,0 C25,15 15,35 0,40 C-15,35 -25,15 -20,0 C-25,-15 -15,-35 0,-40Z" fill="#7fa7d4" opacity="0.5"/>
    <path d="M0,-28 C10,-24 16,-10 14,0 C16,10 10,24 0,28 C-10,24 -16,10 -14,0 C-16,-10 -10,-24 0,-28Z" fill="#d4e0f0" opacity="0.6"/>
    <path d="M0,-16 C6,-14 9,-6 8,0 C9,6 6,14 0,16 C-6,14 -9,6 -8,0 C-9,-6 -6,-14 0,-16Z" fill="#14224a" opacity="0.4"/>
    <path d="M-25,-30 C-20,-45 -5,-50 5,-40 C15,-50 30,-45 25,-30 C35,-20 40,-5 30,0" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.6"/>
    <path d="M-30,-25 C-45,-20 -50,-5 -40,5 C-50,15 -45,30 -30,25" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.6"/>
    <path d="M25,-30 C35,-20 40,-5 30,0" fill="none" stroke="#d4e0f0" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Top-right corner rose -->
  <g transform="translate(1520,80) scale(1.1) scale(-1,1)" opacity="0.7">
    <path d="M0,-40 C15,-35 25,-15 20,0 C25,15 15,35 0,40 C-15,35 -25,15 -20,0 C-25,-15 -15,-35 0,-40Z" fill="#7fa7d4" opacity="0.5"/>
    <path d="M0,-28 C10,-24 16,-10 14,0 C16,10 10,24 0,28 C-10,24 -16,10 -14,0 C-16,-10 -10,-24 0,-28Z" fill="#d4e0f0" opacity="0.6"/>
    <path d="M0,-16 C6,-14 9,-6 8,0 C9,6 6,14 0,16 C-6,14 -9,6 -8,0 C-9,-6 -6,-14 0,-16Z" fill="#14224a" opacity="0.4"/>
    <path d="M-25,-30 C-20,-45 -5,-50 5,-40 C15,-50 30,-45 25,-30 C35,-20 40,-5 30,0" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.6"/>
    <path d="M-30,-25 C-45,-20 -50,-5 -40,5 C-50,15 -45,30 -30,25" fill="none" stroke="#7fa7d4" stroke-width="1.5" opacity="0.6"/>
    <path d="M25,-30 C35,-20 40,-5 30,0" fill="none" stroke="#d4e0f0" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Bottom-left corner rose -->
  <g transform="translate(80,820) scale(1.1) scale(1,-1)" opacity="0.7">
    <path d="M0,-40 C15,-35 25,-15 20,0 C25,15 15,35 0,40 C-15,35 -25,15 -20,0 C-25,-15 -15,-35 0,-40Z" fill="#7fa7d4" opacity="0.5"/>
    <path d="M0,-28 C10,-24 16,-10 14,0 C16,10 10,24 0,28 C-10,24 -16,10 -14,0 C-16,-10 -10,-24 0,-28Z" fill="#d4e0f0" opacity="0.6"/>
    <path d="M0,-16 C6,-14 9,-6 8,0 C9,6 6,14 0,16 C-6,14 -9,6 -8,0 C-9,-6 -6,-14 0,-16Z" fill="#14224a" opacity="0.4"/>
  </g>

  <!-- Bottom-right corner rose -->
  <g transform="translate(1520,820) scale(1.1) scale(-1,1) scale(1,-1)" opacity="0.7">
    <path d="M0,-40 C15,-35 25,-15 20,0 C25,15 15,35 0,40 C-15,35 -25,15 -20,0 C-25,-15 -15,-35 0,-40Z" fill="#7fa7d4" opacity="0.5"/>
    <path d="M0,-28 C10,-24 16,-10 14,0 C16,10 10,24 0,28 C-10,24 -16,10 -14,0 C-16,-10 -10,-24 0,-28Z" fill="#d4e0f0" opacity="0.6"/>
    <path d="M0,-16 C6,-14 9,-6 8,0 C9,6 6,14 0,16 C-6,14 -9,6 -8,0 C-9,-6 -6,-14 0,-16Z" fill="#14224a" opacity="0.4"/>
  </g>

  <!-- Top border scrollwork -->
  <g opacity="0.5">
    <path d="M200,50 Q250,30 300,50 Q350,70 400,50 Q450,30 500,50 Q550,70 600,50 Q650,30 700,50 Q750,70 800,50 Q850,30 900,50 Q950,70 1000,50 Q1050,30 1100,50 Q1150,70 1200,50 Q1250,30 1300,50 Q1350,70 1400,50" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
    <path d="M200,55 Q250,75 300,55 Q350,35 400,55 Q450,75 500,55 Q550,35 600,55 Q650,75 700,55 Q750,35 800,55 Q850,75 900,55 Q950,35 1000,55 Q1050,75 1100,55 Q1150,35 1200,55 Q1250,75 1300,55 Q1350,35 1400,55" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
  </g>

  <!-- Bottom border scrollwork -->
  <g opacity="0.5" transform="translate(0,850)">
    <path d="M200,0 Q250,20 300,0 Q350,-20 400,0 Q450,20 500,0 Q550,-20 600,0 Q650,20 700,0 Q750,-20 800,0 Q850,20 900,0 Q950,-20 1000,0 Q1050,20 1100,0 Q1150,-20 1200,0 Q1250,20 1300,0 Q1350,-20 1400,0" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
  </g>

  <!-- Left border scrollwork -->
  <g opacity="0.5">
    <path d="M50,200 Q30,250 50,300 Q70,350 50,400 Q30,450 50,500 Q70,550 50,600 Q30,650 50,700" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
  </g>

  <!-- Right border scrollwork -->
  <g opacity="0.5" transform="translate(1550,0)">
    <path d="M0,200 Q-20,250 0,300 Q20,350 0,400 Q-20,450 0,500 Q20,550 0,600 Q-20,650 0,700" fill="none" stroke="#7fa7d4" stroke-width="1.2"/>
