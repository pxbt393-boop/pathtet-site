<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbfe"/>
      <stop offset="100%" stop-color="#e8eef7"/>
    </linearGradient>
    <radialGradient id="warmglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fafbfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4e0f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle texture overlay -->
  <g opacity="0.04">
    <circle cx="100" cy="100" r="1" fill="#14224a"/>
    <circle cx="300" cy="200" r="1.2" fill="#14224a"/>
    <circle cx="500" cy="150" r="0.8" fill="#14224a"/>
    <circle cx="800" cy="100" r="1" fill="#14224a"/>
    <circle cx="1100" cy="180" r="1.2" fill="#14224a"/>
    <circle cx="1300" cy="120" r="0.8" fill="#14224a"/>
    <circle cx="1500" cy="200" r="1" fill="#14224a"/>
  </g>

  <!-- Outer Gzhel border -->
  <rect x="12" y="12" width="1576" height="876" fill="none" stroke="#14224a" stroke-width="3" rx="8"/>
  <rect x="20" y="20" width="1560" height="860" fill="none" stroke="#7fa7d4" stroke-width="1" rx="6"/>
  <rect x="28" y="28" width="1544" height="844" fill="none" stroke="#d4e0f0" stroke-width="1" rx="4"/>

  <!-- Corner rosettes -->
  <g transform="translate(90,90) scale(1.1)" opacity="0.45">
    <path d="M0,-35 C14,-30 22,-12 18,0 C22,12 14,30 0,35 C-14,30 -22,12 -18,0 C-22,-12 -14,-30 0,-35Z" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M0,-22 C9,-18 14,-8 12,0 C14,8 9,18 0,22 C-9,18 -14,8 -12,0 C-14,-8 -9,-18 0,-22Z" fill="#d4e0f0" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#7fa7d4" opacity="0.35"/>
    <path d="M-22,-22 C-15,-30 -5,-32 0,-28" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
    <path d="M22,-22 C15,-30 5,-32 0,-28" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
    <path d="M-22,22 C-15,30 -5,32 0,28" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
    <path d="M22,22 C15,30 5,32 0,28" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
  </g>
  <g transform="translate(1510,90) scale(-1,1) scale(1.1)" opacity="0.45">
    <path d="M0,-35 C14,-30 22,-12 18,0 C22,12 14,30 0,35 C-14,30 -22,12 -18,0 C-22,-12 -14,-30 0,-35Z" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M0,-22 C9,-18 14,-8 12,0 C14,8 9,18 0,22 C-9,18 -14,8 -12,0 C-14,-8 -9,-18 0,-22Z" fill="#d4e0f0" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#7fa7d4" opacity="0.35"/>
  </g>
  <g transform="translate(90,810) scale(1,-1) scale(1.1)" opacity="0.45">
    <path d="M0,-35 C14,-30 22,-12 18,0 C22,12 14,30 0,35 C-14,30 -22,12 -18,0 C-22,-12 -14,-30 0,-35Z" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M0,-22 C9,-18 14,-8 12,0 C14,8 9,18 0,22 C-9,18 -14,8 -12,0 C-14,-8 -9,-18 0,-22Z" fill="#d4e0f0" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#7fa7d4" opacity="0.35"/>
  </g>
  <g transform="translate(1510,810) scale(-1,-1) scale(1.1)" opacity="0.45">
    <path d="M0,-35 C14,-30 22,-12 18,0 C22,12 14,30 0,35 C-14,30 -22,12 -18,0 C-22,-12 -14,-30 0,-35Z" fill="none" stroke="#7fa7d4" stroke-width="1.5"/>
    <path d="M0,-22 C9,-18 14,-8 12,0 C14,8 9,18 0,22 C-9,18 -14,8 -12,0 C-14,-8 -9,-18 0,-22Z" fill="#d4e0f0" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#7fa7d4" opacity="0.35"/>
  </g>

  <!-- ============ Table setting ============ -->

  <!-- Warm ambient glow -->
  <ellipse cx="800" cy="450" rx="650" ry="380" fill="url(#warmglow)" filter="url(#glow)"/>

  <!-- Table top -->
  <ellipse cx="800" cy="680" rx="640" ry="140" fill="#fafbfe" opacity="0.3"/>
  <ellipse cx="800" cy="680" rx="620" ry="130" fill="#d4e0f0" opacity="0.12"/>
  <!-- Table edge detail -->
  <path d="M180,650 Q800,710 1420,650" fill="none" stroke="#7fa7d4" stroke-width="1" opacity="0.3"/>
  <path d="M200,660 Q800,720 1400,660" fill="none" stroke="#d4e0f0" stroke-width="0.6" opacity="0.2"/>

  <!-- Gzhel tablecloth / runner -->
  <path d="M350,600 L380,580 L1220,580 L1250,600 Z" fill="#fafbfe" opacity="0.6" stroke="#7fa7d4" stroke-width="1"/>
  <path d="M370,590 L390,575 L1210,575 L1230,590 Z" fill="none" stroke="#d4e0f0" stroke-width="0.8" opacity="0.4"/>
  <!-- Runner Gzhel pattern -->
  <g opacity="0.2">
    <circle cx="550" cy="590" r="8" fill="none" stroke="#7fa7d4" stroke-width="0.8"/>
    <circle cx="550" cy="590" r="4" fill="#d4e0f0"/>
    <circle cx="750" cy="590" r="8" fill="none" stroke="#7fa7d4" stroke-width="0.8"/>
    <circle cx="750" cy="590" r="4" fill="#d4e0f0"/>
    <circle cx="950" cy="590" r="8" fill="none" stroke="#7fa7d4" stroke-width="0.8"/>
    <circle cx="950" cy="590" r="4" fill="#d4e0f0"/>
    <circle cx="1050" cy="590" r="8" fill="none" stroke="#7fa7d4" stroke-width="0.8"/>
    <circle cx="1050" cy="590" r="4" fill="#d4e0f0"/>
  </g>

  <!-- ============ Jars on table ============ -->

  <!-- Main jar (center) -->
  <g transform="translate(800,530)">
    <ellipse cx="0" cy="100" rx="65" ry="14" fill="#14224a" opacity="0.08"/>
    <ellipse cx="0" cy="100" rx="50" ry="10" fill="#14224a" opacity="0.05"/>

    <path d="M-55,-30 Q-63,20 -52,90 Q-48,105 0,105 Q48,105 52,90 Q63,20 55,-30Z" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2" opacity="0.85"/>
    <path d="M-51,0 Q-58,30 -48,80 Q-44,95 0,95 Q44,95 48,80 Q58,30 51,0Z" fill="#e8eef7" opacity="0.3"/>
    <!-- Pâté visible -->
    <ellipse cx="0" cy="-30" rx="53" ry="14" fill="#d4e0f0" opacity="0.25"/>

    <rect x="-42" y="-68" width="84" height="42" rx="5" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1"/>
    <rect x="-38" y="-64" width="76" height="34" rx="4" fill="#fafbfe" opacity="0.3"/>
    <!-- Lid -->
    <circle cx="0" cy="-82" r="32" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1" opacity="0.7"/>
    <!-- Label -->
    <rect x="-35" y="0" width="70" height="40" rx="3" fill="#fafbfe" opacity="0.5" stroke="#d4e0f0" stroke-width="0.6"/>
    <text x="0" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#14224a" opacity="0.45">НЕГЛИЖЕ</text>
    <text x="0" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#7fa7d4" opacity="0.35">ПАШТЕТ</text>

    <!-- Glass highlight -->
    <path d="M-40,-20 Q-48,25 -38,80" fill="none" stroke="#fafbfe" stroke-width="2" opacity="0.2"/>
  </g>

  <!-- Left jar -->
  <g transform="translate(640,535) scale(0.75)">
    <ellipse cx="0" cy="95" rx="55" ry="12" fill="#14224a" opacity="0.07"/>
    <path d="M-50,-25 Q-56,20 -46,85 Q-42,98 0,98 Q42,98 46,85 Q56,20 50,-25Z" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1" opacity="0.7"/>
    <path d="M-46,0 Q-52,28 -42,75 Q-38,88 0,88 Q38,88 42,75 Q52,28 46,0Z" fill="#e8eef7" opacity="0.25"/>
    <rect x="-38" y="-58" width="76" height="38" rx="4" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8"/>
    <circle cx="0" cy="-72" r="28" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Right jar -->
  <g transform="translate(960,540) scale(0.7)">
    <ellipse cx="0" cy="95" rx="55" ry="12" fill="#14224a" opacity="0.07"/>
    <path d="M-50,-25 Q-56,20 -46,85 Q-42,98 0,98 Q42,98 46,85 Q56,20 50,-25Z" fill="#fafbfe" stroke="#d4e0f0" stroke-width="1" opacity="0.7"/>
    <path d="M-46,0 Q-52,28 -42,75 Q-38,88 0,88 Q38,88 42,75 Q52,28 46,0Z" fill="#e8eef7" opacity="0.25"/>
    <rect x="-38" y="-58" width="76" height="38" rx="4" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8"/>
    <circle cx="0" cy="-72" r="28" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- ============ Baguette slices ============ -->

  <!-- Baguette on a board -->
  <rect x="250" y="560" width="260" height="80" rx="6" fill="#d4e0f0" opacity="0.2"/>
  <rect x="255" y="565" width="250" height="70" rx="4" fill="#fafbfe" opacity="0.3"/>

  <g transform="translate(380,560) rotate(-5)">
    <ellipse cx="0" cy="0" rx="110" ry="22" fill="#d4e0f0" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="108" ry="20" fill="#fafbfe" opacity="0.5"/>
    <!-- Scoring -->
    <path d="M-80,-6 Q-60,-18 -40,-6" fill="none" stroke="#7fa7d4" stroke-width="1.2" opacity="0.3"/>
    <path d="M-30,-6 Q-10,-18 10,-6" fill="none" stroke="#7fa7d4" stroke-width="1.2" opacity="0.3"/>
    <path d="M20,-6 Q40,-18 60,-6" fill="none" stroke="#7fa7d4" stroke-width="1.2" opacity="0.3"/>
  </g>

  <!-- Slices -->
  <g transform="translate(520,580)">
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="14" ry="17" fill="#e8eef7"/>
  </g>
  <g transform="translate(550,585)">
    <ellipse cx="0" cy="0" rx="18" ry="22" fill="#fafbfe" stroke="#d4e0f0" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="14" ry="17" fill="#e8eef7"/>
  </g>

  <!-- ============ Cranberry jam bowl ============ -->
  <g transform="translate(1100,570)">
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2"/>
    <path d="M-60,0 Q-60,-45 0,-55 Q60,-45 60,0" fill="#fafbfe" stroke="#7fa7d4" stroke-width="1.2"/>
    <ellipse cx="0" cy="-18" rx="50" ry="30" fill="#d4e0f0" opacity="0.3"/>
    <!-- Berries -->
    <circle cx="-15" cy="-22" r="5" fill="#14224a" opacity="0.12"/>
    <circle cx="12" cy="-28" r="4.5" fill="#14224a" opacity="0.1"/>
    <circle cx="5" cy="-15" r="5" fill="#14224a" opacity="0.12"/>
    <circle cx="-5" cy="-32" r="4" fill="#14224a" opacity="0.08"/>
    <circle cx="20" cy="-18" r="4" fill="#14224a" opacity="0.1"/>
  </g>

  <!-- ============ Decorative elements ============ -->

  <!-- Small floral decor on table -->
  <g transform="translate(290,640)" opacity="0.2">
    <path d="M0,-15 Q8,-10 10,0 Q8,10 0,15" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="10" cy="0" r="3" fill="#7fa7d4"/>
    <path d="M0,-8 Q5,-5 7,0" fill="none" stroke="#d4e0f0" stroke-width="0.8"/>
  </g>

  <g transform="translate(1310,640) scale(-1,1)" opacity="0.2">
    <path d="M0,-15 Q8,-10 10,0 Q8,10 0,15" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="10" cy="0" r="3" fill="#7fa7d4"/>
  </g>

  <!-- ============ Title ============ -->
  <text x="800" y="155" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#14224a" letter-spacing="4" opacity="0.8">СЕРВИРОВКА</text>
  <text x="800" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#7fa7d4" letter-spacing="3" opacity="0.55">ПАШТЕТ С БАГЕТОМ И КЛЮКВЕННЫМ ДЖЕМОМ</text>

  <g opacity="0.3" transform="translate(550,200)">
    <path d="M0,0 Q130,12 260,0" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <path d="M0,4 Q130,16 260,4" fill="none" stroke="#d4e0f0" stroke-width="0.6"/>
  </g>

  <!-- Gzhel side sprays -->
  <g transform="translate(180,370)" opacity="0.2">
    <path d="M0,60 Q20,35 15,0 Q10,-25 0,-50" fill="none" stroke="#7fa7d4" stroke-width="1.3"/>
    <path d="M15,0 C28,-18 22,-40 8,-28" fill="none" stroke="#d4e0f0" stroke-width="1"/>
    <circle cx="8" cy="-28" r="9" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="8" cy="-28" r="4.5" fill="#d4e0f0" opacity="0.4"/>
  </g>

  <g transform="translate(1420,370) scale(-1,1)" opacity="0.2">
    <path d="M0,60 Q20,35 15,0 Q10,-25 0,-50" fill="none" stroke="#7fa7d4" stroke-width="1.3"/>
    <path d="M15,0 C28,-18 22,-40 8,-28" fill="none" stroke="#d4e0f0" stroke-width="1"/>
    <circle cx="8" cy="-28" r="9" fill="none" stroke="#7fa7d4" stroke-width="1"/>
    <circle cx="8" cy="-28" r="4.5" fill="#d4e0f0" opacity="0.4"/>
  </g>

  <!-- Bottom label -->
  <rect x="650" y="830" width="300" height="36" rx="18" fill="#14224a" opacity="0.07"/>
  <text x="800" y="854" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#14224a" letter-spacing="2" opacity="0.55">ФОТО ПРЕДПРОСМОТР</text>
</svg>
